name: Bug report
description: Report a problem with TurboStack
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: affected
    attributes:
      label: Affected app / package
      description: e.g. apps/www, apps/app, packages/ui, packages/api
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), pnpm version, browser if relevant.

version: 2
updates:
  # JavaScript / TypeScript dependencies across the pnpm workspace + catalog.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch non-major bumps into a single PR; majors stay individual for review.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Action versions used in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope

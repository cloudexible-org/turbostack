name: CI

# Validation only — lint and typecheck.
# Deployment is handled by Vercel; this workflow does not build or deploy.
# Unit tests (@repo/ui Storybook stories) run in a real browser and are run
# locally via `pnpm test`, not in CI.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Turbo Remote Caching (shared with Vercel builds). Both are optional — Turbo
# falls back to local cache when unset, so CI works before they're configured.
# To enable: add a TURBO_TOKEN repo secret (a Vercel access token) and a
# TURBO_TEAM repo variable (your Vercel team slug).
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  validate:
    name: lint · typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
